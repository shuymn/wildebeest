name: Pull request checks
on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/workflows/**"
      - "!.github/workflows/PRs.yml"
      - "*.md"
      - "docs/**"
      - "renovate.json"
  pull_request:
    paths-ignore:
      - ".github/workflows/**"
      - "!.github/workflows/PRs.yml"
      - "*.md"
      - "docs/**"
      - "renovate.json"

# This allows a subsequently queued workflow run to interrupt previous runs
concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

env:
  SQLDEF_VERSION: v3.11.12
  OCTOCOV_VERSION: v0.75.8

jobs:
  test-api:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Run API tests
        run: pnpm run test --shard ${{ matrix.shard }}/${{ strategy.job-total }} --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: octocov-${{ matrix.shard }}
          path: coverage/lcov.info
          if-no-files-found: error

  coverage:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: test-api
    permissions:
      contents: read
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: octocov-*

      - name: Normalize coverage reports
        run: |
          for shard in 1 2 3; do
            report="octocov-${shard}/lcov.info"
            if [ -f "${report}" ]; then
              continue
            fi
            cp "octocov-${shard}/coverage/lcov.info" "${report}"
          done

      - uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1
        with:
          version: ${{ env.OCTOCOV_VERSION }}

  lint:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Check formatting
        run: pnpm run pretty

      - name: Check backend linting
        run: pnpm run lint:backend

      - name: Check consumer linting
        run: pnpm run lint:consumer

      - name: Check do linting
        run: pnpm run lint:do

      - name: Check frontend linting
        run: pnpm run lint:frontend

      - name: Check frontend types
        continue-on-error: true
        working-directory: packages/frontend
        run: pnpm run types-check

      - name: Install sqlite3def
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo sqldef/sqldef --pattern "sqlite3def_linux_amd64.tar.gz" "${{ env.SQLDEF_VERSION }}" --output - | tar -xzf -
          mv sqlite3def /usr/local/bin/sqlite3def
          chmod +x /usr/local/bin/sqlite3def
          sqlite3def --version

      - name: Check DB schema
        run: bash scripts/check-schema.sh

  test-ui:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run App in the background
        run: |
          nohup pnpm run ci-dev-test-ui >"${RUNNER_TEMP}/ci-dev-test-ui.log" 2>&1 &
          echo "$!" >"${RUNNER_TEMP}/ci-dev-test-ui.pid"

      - name: Store Playwright version
        working-directory: packages/frontend
        run: |
          PLAYWRIGHT_VERSION=$(pnpm ls @playwright/test --json | jq --exit-status --raw-output 'first | .devDependencies["@playwright/test"].version')
          echo "Playwright version: ${PLAYWRIGHT_VERSION}"
          echo "PLAYWRIGHT_VERSION=${PLAYWRIGHT_VERSION}" >> "$GITHUB_ENV"

      - name: Cache Playwright
        id: cache-playwright-browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /home/runner/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ runner.arch }}-${{ env.PLAYWRIGHT_VERSION }}

      - name: Download Playwright browsers
        working-directory: packages/frontend
        run: npx playwright install --with-deps

      - name: Wait for app readiness
        run: |
          APP_LOG="${RUNNER_TEMP}/ci-dev-test-ui.log"

          check_ready() {
            curl --fail --silent --show-error --connect-timeout 5 --max-time 10 http://127.0.0.1:8788/explore >/dev/null
          }

          for _ in {1..180}; do
            if check_ready; then
              exit 0
            fi
            sleep 2
          done

          echo "::group::ci-dev-test-ui log"
          tail -n 200 "${APP_LOG}" || true
          echo "::endgroup::"
          check_ready

      - name: Run Playwright tests
        run: pnpm run test:ui

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: packages/frontend/playwright-report/
          retention-days: 30
